name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install driver deps
        working-directory: skills/garelier-core/driver
        run: bun install
      - name: CI gate (typecheck + tests + syntax + wizard smoke)
        run: bash ci.sh
