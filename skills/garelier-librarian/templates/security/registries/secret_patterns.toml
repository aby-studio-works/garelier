# Secret detection patterns (Librarian-owned; Guardian reads, never edits).
# Backs the secret scanner (e.g. gitleaks) and the Guardian's manual review.
# General-purpose defaults — add/adjust per project, PM/owner approves changes.
# Guardian must NEVER paste a matched value into a report (redact / pointer only).

[[patterns]]
id = "aws-access-key-id"
regex = "AKIA[0-9A-Z]{16}"
severity = "critical"

[[patterns]]
id = "github-token"
regex = "gh[pousr]_[A-Za-z0-9]{36,}"
severity = "critical"

[[patterns]]
id = "openai-anthropic-style-key"
regex = "sk-[A-Za-z0-9]{20,}"
severity = "critical"

[[patterns]]
id = "slack-token"
regex = "xox[baprs]-[A-Za-z0-9-]+"
severity = "critical"

[[patterns]]
id = "google-api-key"
regex = "AIza[0-9A-Za-z_-]{35}"
severity = "high"

[[patterns]]
id = "private-key-block"
regex = "-----BEGIN [A-Z ]*PRIVATE KEY-----"
severity = "critical"

[[patterns]]
id = "jwt"
regex = "eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}"
severity = "high"

[[patterns]]
id = "generic-credential-assignment"
# api_key / secret / token / password = "<12+ chars>"
regex = "(?i)(api[_-]?key|secret|token|passwd|password|access[_-]?token|client[_-]?secret)\\s*[:=]\\s*['\"][^'\"]{12,}['\"]"
severity = "high"
note = "Ignore obvious placeholders: example, your-, changeme, <...>, ${...}, env.*, process.env"
