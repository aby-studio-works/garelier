# Garelier source registry (Librarian-managed)
# Knowledge-relative path: source_registry.toml
#
# Registered external information sources the Librarian may treat as
# authoritative. The Librarian adopts ONLY registered sources. Adding a
# new source is a change on a `shelf` branch reviewed by Dock.
#
# `target` is KNOWLEDGE-RELATIVE: the transformed knowledge lands under the
# knowledge roots (`__garelier/__atmos/knowledge/` or
# `__garelier/<pm_id>/knowledge/`), NOT a project path. Do not point it at
# `docs/` — that would conflate the knowledge source of truth with a project
# mirror. (Role knowledge trees below use the same knowledge-relative form.)

[[sources]]
id = "company-test-policy"
title = "社内テスト規約"
kind = "testing_rules"
source_type = "sharepoint"            # sharepoint | url | local_file | repo_file
url = "https://example.sharepoint.com/sites/dev/test-policy"
target = "rules/testing_rules.md"
transform = "testing_rules_v1"
owner = "pm"
update_mode = "manual"                # manual | scheduled | on_demand
trust = "internal-authoritative"
authority = "internal"
license = "confirmed"
use = "internal-policy-source"
last_reviewed_at = ""                  # Fill before first sync/adoption.
last_synced_at = ""

[[sources]]
id = "company-coding-policy"
title = "社内コーディング規約"
kind = "coding_rules"
source_type = "sharepoint"
url = "https://example.sharepoint.com/sites/dev/coding-policy"
target = "rules/coding_rules.md"
transform = "coding_rules_v1"
owner = "pm"
update_mode = "manual"
trust = "internal-authoritative"
authority = "internal"
license = "confirmed"
use = "internal-policy-source"
last_reviewed_at = ""                  # Fill before first sync/adoption.
last_synced_at = ""

# --- Role knowledge trees (DEC-029) ---
# These point at the project's own generalized knowledge files (not external
# copies). When a source is an EXTERNAL url, the Librarian MUST also record:
#   authority = official | recognized | internal | third-party
#   license   = confirmed | unknown | not-adoptable
#   use       = inspiration-only | allowed-summary | internal-policy-source
# and an owner approval + last_reviewed_at — and never copy the source's text or
# structure; only generalize it into original project wording. See
# the security/provenance_rights_policy.md knowledge file.

