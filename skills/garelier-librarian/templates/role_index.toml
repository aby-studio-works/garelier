# Role knowledge index (DEC-048) — SINGLE SOURCE OF TRUTH for "what each role reads".
#
# The per-topic index.md files (engineering/quality/review/system/security/...)
# organize knowledge BY TOPIC and carry a Consumption-rules table. This file is
# the INVERSE axis: BY ROLE. It is authoritative for the role -> docs mapping;
# a CI lint keeps it consistent with the topic trees so the two cannot drift.
#
# Discipline (compact handoff / token budget): a role reads its `read_first`
# set BEFORE a non-trivial task; everything else is `on_demand` (open only when
# the task touches it). If the index does not resolve a question, the role files
# a read-only `knowledge_query` to the Librarian for a broad search of the
# curated trees (template: knowledge_query.md). Free web investigation is NOT
# this path — that is Scout's job.
#
# Paths are knowledge-relative (`<tree>/<file>`); the resolver finds each over the
# shared __atmos layer first, then this pm's additive knowledge layer, unless a
# per-pm topic explicitly sets override_shared: true (DEC-077).
# Owner: PM / knowledge owner.  Maintainer: Librarian (shelf branch + Dock review).

schema_version = 1

# === Trigger axis (DEC-067) ===
#
# Knowledge routed by WHAT the work touches, not by WHO does it (the roles.*
# tables below are the WHO axis). When an assignment's text or its diff's
# paths match an entry's `when` (path glob or keyword, case-insensitive),
# the entry's `read` docs are promoted into the executing role's read_first
# set FOR THAT TASK, and reviewers (Guardian/Observer) load them for the
# matching diff. Prompt-assembly rule — see
# garelier-core/references/knowledge-consult.md §triggers.
#
# Keep the list SMALL and the `when` patterns NARROW: a trigger that fires
# on everything is the same as always-on and just burns context. Owner: PM
# approves entries; Librarian maintains them like any registry change.

[[triggers]]
when = ["dependency", "Cargo.toml", "package.json", "license"]
read = ["security/dependency_policy.md", "security/license_policy.md"]
note = "dependency/license-surface work always carries the policies, regardless of role"

[[triggers]]
when = ["bug", "fix", "regression", "panic", "flaky", "crash"]
read = ["engineering/debugging_principles.md"]
note = "bug-flavored work always opens with the ordered first-moves sequence"

[[triggers]]
when = ["hardening", "integration test", "anvil", "smith batch", "window"]
read = ["quality/integration_hardening_views.md"]
note = "window-hardening work opens with the ordered Smith views"

[[triggers]]
when = ["refactor", "rename", "signature", "schema", "format", "api change", "field"]
read = ["engineering/change_propagation_policy.md"]
note = "definition-shape changes always carry the consumer-census / closure / old-behavior-verify discipline"

[[triggers]]
when = ["restructure", "rewrite", "architecture refactor", "module boundary", "large-scale refactor", "codebase-wide"]
read = ["engineering/refactoring_playbook.md"]
note = "multi-change restructuring opens with the phased playbook (target -> baseline -> graph map -> strangler steps -> enforcement)"

# [[triggers]]
# when = ["core/engine/**"]                # path glob: fires when the diff touches it
# read = ["engineering/change_isolation_policy.md"]
# note = "engine-core edits carry the isolation policy"

[roles.worker]
read_first = [
  "engineering/index.md",
  "quality/index.md",
]
on_demand = [
  "engineering/implementation_principles.md",
  "engineering/debugging_principles.md",
  "engineering/change_isolation_policy.md",
  "engineering/change_propagation_policy.md",
  "engineering/refactoring_playbook.md",
  "engineering/evidence_policy.md",
  "quality/quality_gate_policy.md",
  "quality/regression_policy.md",
  "quality/flaky_test_policy.md",
  "security/commit_hygiene_policy.md",
  "system/index.md",
]
note = "Implementation + local quality gate. commit_hygiene before every commit."

[roles.smith]
read_first = [
  "quality/index.md",
  "quality/integration_hardening_views.md",
  "security/index.md",
]
on_demand = [
  "quality/test_strategy.md",
  "quality/coverage_evidence_policy.md",
  "quality/regression_policy.md",
  "quality/cross_artifact_consistency.md",
  "security/license_policy.md",
  "security/dependency_policy.md",
  "system/index.md",
]
note = "Post-merge hardening: integration/system tests, license/security/compliance."

[roles.observer]
read_first = [
  "review/index.md",
]
on_demand = [
  "review/observer_review_principles.md",
  "review/user_perspective_review.md",
  "review/system_impact_review.md",
  "review/review_evidence_policy.md",
  "system/index.md",
]
note = "Independent read-only review. user_perspective for user-visible change; system_impact for framework change."

[roles.guardian]
read_first = [
  "security/index.md",
]
on_demand = [
  "security/security_policy.md",
  "security/privacy_pii_policy.md",
  "security/license_policy.md",
  "security/provenance_rights_policy.md",
  "security/dependency_policy.md",
  "security/scanner_runbook.md",
  "security/incident_response_runbook.md",
]
note = "Security/privacy/dependency/license gate. Applies the rules; never edits them."

[roles.concierge]
read_first = [
  "security/index.md",
  "external_operations/external_operations_policy.md",
]
on_demand = [
  "external_operations/git_remote_policy.md",
  "external_operations/promote_policy.md",
  "external_operations/rollback_policy.md",
  "external_operations/pull_request_policy.md",
  "external_operations/release_policy.md",
  "external_operations/ticket_policy.md",
  "security/provenance_rights_policy.md",
]
note = "Executes the approved external operation after a passing Guardian gate."

[roles.dock]
read_first = [
  "system/index.md",
]
on_demand = [
  "system/role_boundary_matrix.md",
  "system/decision_authority.md",
  "system/escalation_policy.md",
  "review/index.md",
  "engineering/index.md",
  "quality/index.md",
]
note = "Names the knowledge a producer should consult when writing an assignment; judges review/merge readiness."

[roles.pm]
read_first = [
  "system/decision_authority.md",
  "system/escalation_policy.md",
]
on_demand = [
  "system/index.md",
  "quality/quality_gate_policy.md",
  "engineering/refactoring_playbook.md",
]
note = "Decisions/authority/escalation. PM never edits source or the knowledge trees. The refactoring playbook's Phase 0 (target / triage / riskiest unknown) is PM planning input."

[roles.artisan]
# Artisan = Worker ∪ Scout ∪ Smith ∪ Librarian-lite (DEC-017 / DEC-056 combined scope). It reads
# comprehensively across the producer roles it stands in for, plus review +
# security because it integrates its own satchel branch into studio.
union_of = ["worker", "scout", "smith"]
read_first = [
  "engineering/index.md",
  "quality/index.md",
  "review/index.md",
  "security/index.md",
]
on_demand = [
  "engineering/implementation_principles.md",
  "engineering/change_isolation_policy.md",
  "engineering/change_propagation_policy.md",
  "engineering/refactoring_playbook.md",
  "quality/test_strategy.md",
  "quality/coverage_evidence_policy.md",
  "review/observer_review_principles.md",
  "security/commit_hygiene_policy.md",
  "security/license_policy.md",
  "security/provenance_rights_policy.md",
  "system/index.md",
]
note = "End-to-end single agent: read across Worker + Scout + Smith + review + security before investigating, implementing, hardening, and studio integration. Free web research is the Artisan's own scope (Scout-style), not the curated trees."

[roles.scout]
read_first = []
on_demand = [
  "system/index.md",
]
note = "Commit-free investigation; produces inspections. Free research is Scout's own scope, not the curated trees."

[roles.librarian]
# The Librarian OWNS these trees; it reads the tree it is assigned and may edit
# it (with Dock shelf review). It also answers read-only knowledge_query.
read_first = []
on_demand = [
  "engineering/index.md",
  "quality/index.md",
  "review/index.md",
  "system/index.md",
  "security/index.md",
  "engineering/mid_tier_model_robustness.md",
  "security/provenance_rights_policy.md",
]
note = "Owns/maintains the trees + registries; answers knowledge_query (read-only broad search of curated knowledge)."
