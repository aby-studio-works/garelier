# Role knowledge index (DEC-048) — SINGLE SOURCE OF TRUTH for "what each role reads".
#
# The per-topic index.md files (engineering/quality/review/system/security/...)
# organize knowledge BY TOPIC and carry a Consumption-rules table. This file is
# the INVERSE axis: BY ROLE. It is authoritative for the role -> docs mapping;
# a CI lint keeps it consistent with the topic trees so the two cannot drift.
#
# Discipline (compact handoff / token budget): a role reads its `read_first`
# set BEFORE a non-trivial task; everything else is `on_demand` (open only when
# the task touches it). If the index does not resolve a question, the role files
# a read-only `knowledge_query` to the Librarian for a broad search of the
# curated trees (template: knowledge_query.md). Free web investigation is NOT
# this path — that is Scout's job.
#
# Paths are as seen in a target project: docs/garelier/<tree>/<file>.
# Owner: PM / knowledge owner.  Maintainer: Librarian (shelf branch + Dock review).

schema_version = 1

[roles.worker]
read_first = [
  "docs/garelier/engineering/index.md",
  "docs/garelier/quality/index.md",
]
on_demand = [
  "docs/garelier/engineering/implementation_principles.md",
  "docs/garelier/engineering/debugging_principles.md",
  "docs/garelier/engineering/change_isolation_policy.md",
  "docs/garelier/engineering/evidence_policy.md",
  "docs/garelier/quality/quality_gate_policy.md",
  "docs/garelier/quality/regression_policy.md",
  "docs/garelier/quality/flaky_test_policy.md",
  "docs/garelier/security/commit_hygiene_policy.md",
  "docs/garelier/system/index.md",
]
note = "Implementation + local quality gate. commit_hygiene before every commit."

[roles.smith]
read_first = [
  "docs/garelier/quality/index.md",
  "docs/garelier/security/index.md",
]
on_demand = [
  "docs/garelier/quality/test_strategy.md",
  "docs/garelier/quality/coverage_evidence_policy.md",
  "docs/garelier/quality/regression_policy.md",
  "docs/garelier/quality/cross_artifact_consistency.md",
  "docs/garelier/security/license_policy.md",
  "docs/garelier/security/dependency_policy.md",
  "docs/garelier/system/index.md",
]
note = "Post-merge hardening: integration/system tests, license/security/compliance."

[roles.observer]
read_first = [
  "docs/garelier/review/index.md",
]
on_demand = [
  "docs/garelier/review/observer_review_principles.md",
  "docs/garelier/review/user_perspective_review.md",
  "docs/garelier/review/system_impact_review.md",
  "docs/garelier/review/review_evidence_policy.md",
  "docs/garelier/system/index.md",
]
note = "Independent read-only review. user_perspective for user-visible change; system_impact for framework change."

[roles.guardian]
read_first = [
  "docs/garelier/security/index.md",
]
on_demand = [
  "docs/garelier/security/security_policy.md",
  "docs/garelier/security/privacy_pii_policy.md",
  "docs/garelier/security/license_policy.md",
  "docs/garelier/security/provenance_rights_policy.md",
  "docs/garelier/security/dependency_policy.md",
  "docs/garelier/security/scanner_runbook.md",
  "docs/garelier/security/incident_response_runbook.md",
]
note = "Security/privacy/dependency/license gate. Applies the rules; never edits them."

[roles.concierge]
read_first = [
  "docs/garelier/security/index.md",
  "docs/garelier/external_operations/external_operations_policy.md",
]
on_demand = [
  "docs/garelier/external_operations/git_remote_policy.md",
  "docs/garelier/external_operations/promote_policy.md",
  "docs/garelier/external_operations/rollback_policy.md",
  "docs/garelier/external_operations/pull_request_policy.md",
  "docs/garelier/external_operations/release_policy.md",
  "docs/garelier/external_operations/ticket_policy.md",
  "docs/garelier/security/provenance_rights_policy.md",
]
note = "Executes the approved external operation after a passing Guardian gate."

[roles.dock]
read_first = [
  "docs/garelier/system/index.md",
]
on_demand = [
  "docs/garelier/system/role_boundary_matrix.md",
  "docs/garelier/system/decision_authority.md",
  "docs/garelier/system/escalation_policy.md",
  "docs/garelier/review/index.md",
  "docs/garelier/engineering/index.md",
  "docs/garelier/quality/index.md",
]
note = "Names the knowledge a producer should consult when writing an assignment; judges review/merge readiness."

[roles.pm]
read_first = [
  "docs/garelier/system/decision_authority.md",
  "docs/garelier/system/escalation_policy.md",
]
on_demand = [
  "docs/garelier/system/index.md",
  "docs/garelier/quality/quality_gate_policy.md",
]
note = "Decisions/authority/escalation. PM never edits source or the knowledge trees."

[roles.artisan]
# Artisan = Worker ∪ Scout ∪ Smith ∪ Librarian-lite (DEC-017 / DEC-056 combined scope). It reads
# comprehensively across the producer roles it stands in for, plus review +
# security because it integrates its own satchel branch into studio.
union_of = ["worker", "scout", "smith"]
read_first = [
  "docs/garelier/engineering/index.md",
  "docs/garelier/quality/index.md",
  "docs/garelier/review/index.md",
  "docs/garelier/security/index.md",
]
on_demand = [
  "docs/garelier/engineering/implementation_principles.md",
  "docs/garelier/engineering/change_isolation_policy.md",
  "docs/garelier/quality/test_strategy.md",
  "docs/garelier/quality/coverage_evidence_policy.md",
  "docs/garelier/review/observer_review_principles.md",
  "docs/garelier/security/commit_hygiene_policy.md",
  "docs/garelier/security/license_policy.md",
  "docs/garelier/security/provenance_rights_policy.md",
  "docs/garelier/system/index.md",
]
note = "End-to-end single agent: read across Worker + Scout + Smith + review + security before investigating, implementing, hardening, and studio integration. Free web research is the Artisan's own scope (Scout-style), not the curated trees."

[roles.scout]
read_first = []
on_demand = [
  "docs/garelier/system/index.md",
]
note = "Commit-free investigation; produces inspections. Free research is Scout's own scope, not the curated trees."

[roles.librarian]
# The Librarian OWNS these trees; it reads the tree it is assigned and may edit
# it (with Dock shelf review). It also answers read-only knowledge_query.
read_first = []
on_demand = [
  "docs/garelier/engineering/index.md",
  "docs/garelier/quality/index.md",
  "docs/garelier/review/index.md",
  "docs/garelier/system/index.md",
  "docs/garelier/security/index.md",
  "docs/garelier/security/provenance_rights_policy.md",
]
note = "Owns/maintains the trees + registries; answers knowledge_query (read-only broad search of curated knowledge)."
