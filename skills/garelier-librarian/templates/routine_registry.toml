# Garelier routine registry (Librarian-managed)
# Knowledge-relative path: routine_registry.toml
#
# Catalogue of standardized, repeatable work. Purpose: re-dispatch — PM
# reads a routine and hands it to whichever role `default_role` names.
# Each routine points to a runbook that a future run can follow directly.

[[routines]]
id = "daily-progress-update"
title = "今日の進捗まとめ更新"
manual = "runbooks/daily_progress_update.md"
default_role = "librarian"
target_file = "__garelier/<pm_id>/control/project_dashboard/current.md"
trigger = "manual"                    # manual | scheduled | on_demand
risk = "low"

[[routines]]
id = "sharepoint-test-rules-sync"
title = "SharePointテスト規約同期"
manual = "runbooks/sharepoint_test_rules_sync.md"
default_role = "librarian"
source_id = "company-test-policy"     # links to source_registry.toml
target_file = "docs/rules/testing_rules.md"
trigger = "manual"
risk = "medium"

[[routines]]
id = "post-merge-regression-check"
title = "統合後回帰確認"
manual = "runbooks/post_merge_regression_check.md"
default_role = "smith"                # routines may be re-dispatched to non-Librarian roles
trigger = "manual"
risk = "medium"

[[routines]]
id = "tracked-path-rename-migration"
title = "用語/パス改名と本番デプロイ移行"
manual = "runbooks/tracked_path_rename_migration.md"
default_role = "librarian"            # operator executes git mutate steps; PM approves
trigger = "on_demand"
risk = "high"                         # branch divergence parks the pipeline if done wrong (DEC-050)
