# Garelier setup configuration
# Generated by garelier-pm setup wizard.
# Edit and re-run wizard with --mode diff to add/remove agents.

[project]
name = "{{project_name}}"
initialized_at = "{{ISO8601_timestamp}}"
garelier_version = "2.6.1"

[pm]
pm_id = "{{pm_id}}"

[branches]
target = "{{target_branch}}"                       # User-owned target (e.g., main)
target_slug = "{{target_slug}}"                    # Target with '/' replaced by '-'
integration = "garelier/{{target_slug}}/{{pm_id}}/studio"   # Shared integration branch for both lanes

[runner]
# Providers are SEAT DEFAULTS read at dispatch (DEC-063 model_routing):
# claude-code seats run as in-session subagents; codex-cli seats run via
# scripts/dispatch_codex_producer.{sh,ps1} (`codex exec`, DEC-058).
#
# Supported providers (DEC-026 — all governed by the same Garelier roles,
# worktrees, permission profiles, Guardian gates, and Concierge external-op
# policy; adding a provider does not loosen governance):
#   claude-code  -> `claude -p`            Stable default.
#   codex-cli    -> `codex exec`           Implementation/review diversity.
#   gemini-cli   -> `gemini`               Added provider; passes provider smoke.
#   copilot-cli  -> `copilot`              Strong GitHub integration; tools kept strict.
#   cursor-cli   -> `cursor-agent`         First-class (DEC-033); newest/most version-sensitive CLI — verify flags via the provider smoke.
#
# Dispatch-only note (DEC-066): the WIRED spawn paths are claude-code
# (in-session subagent) and codex-cli (dispatch helper). gemini-cli /
# copilot-cli / cursor-cli remain valid seat values for governance bookkeeping
# (DEC-026/033), but their driver-era spawn adapters were removed — running
# them means the orchestrator invokes that CLI manually inside the producer's
# dispatch worktree, with the same gates applying to the returned branch.
# `dangerous` permission is an explicit opt-in for ALL providers.
#
# Model can be omitted or set to the provider name to use that CLI's
# configured default (gemini → gemini-default; copilot/cursor → auto).
pm_provider = "claude-code"
pm_model = "claude-code"
dock_provider = "claude-code"
dock_model = "claude-code"
default_agent_provider = "claude-code"
default_agent_model = "claude-code"
# pm_effort = "xhigh"
# dock_effort = "xhigh"
# default_agent_effort = "xhigh"

# Worker definitions. One [[workers]] block per Worker slot. Keep `id` stable
# (`worker-01`, `worker-02`, ...); change `provider` / `model` to swap the
# executor while reusing the same container.
[[workers]]
id = "worker-01"
provider = "claude-code"
model = "claude-code"
# effort = "xhigh"
worktree = "__garelier/{{pm_id}}/_workers/worker-01"

# [[workers]]
# id = "worker-02"
# provider = "claude-code"
# model = "claude-code"
# worktree = "__garelier/{{pm_id}}/_workers/worker-02"

# [[workers]]
# id = "worker-02"
# provider = "codex-cli"
# model = "gpt-5-codex"
# effort = "xhigh"
# worktree = "__garelier/{{pm_id}}/_workers/worker-02"

# Scout definitions. One [[scouts]] block per Scout slot.
[[scouts]]
id = "scout-01"
provider = "claude-code"
model = "claude-code"
# effort = "xhigh"
worktree = "__garelier/{{pm_id}}/_scouts/scout-01"
idle_task = false           # set true to enable autonomous status summaries
idle_interval_hours = 24    # ignored when idle_task = false

# Smith definitions. One [[smiths]] block per Smith instance.
# Smiths work on task-scoped Anvil branches after Dock merges Worker
# output into studio and requests integration hardening. A FRESH setup
# enables all roles by default; scale down later with --mode diff.
[[smiths]]
id = "smith-01"
provider = "claude-code"
model = "claude-code"
# effort = "xhigh"
worktree = "__garelier/{{pm_id}}/_smiths/smith-01"

# === Lane selection (DEC-056) ===
#
# Which lane runs when runtime/lane.lock is absent. "dock" (default) = the
# parallel pipeline (Dock decomposes a blueprint across Worker / Scout / Smith /
# Librarian). "artisan" = the single-agent Artisan lane runs by default — the
# right choice for small projects where multiple roles are overkill; the Artisan
# does the whole build + investigation + knowledge itself. An explicit lane.lock
# still overrides this per task (e.g. write lane = "dock" to run one dock task
# while default = "artisan").
[lanes]
default = "dock"

# === Artisan (artisan lane) ===
#
# The Artisan performs the combined Dock + Worker + Scout + Smith + Librarian
# scope by ITSELF — build, investigation / web research, and knowledge work — on
# a `satchel` branch, integrating into studio after its quality gate + coverage
# audits + Guardian + Observer (DEC-017 / DEC-045). It is a SINGLETON: exactly
# one [artisan] table, never multiple. The artisan lane is mutually exclusive
# with the dock lane (arbitrated by runtime/lane.lock). A FRESH setup enables all
# roles (including the artisan lane) by default; set enabled = false to scale down.
[artisan]
enabled = true
id = "artisan-01"
provider = "claude-code"
model = "claude-code"
# effort = "xhigh"
worktree = "__garelier/{{pm_id}}/_artisan"
branch_namespace = "satchel"

# === Librarian definitions (dock lane) ===
#
# One [[librarians]] block per Librarian instance. Librarians do
# knowledge / registry / runbook work (external-info sync, internal
# rules, runbooks, source_registry/routine_registry) on a `shelf` branch,
# merged through Dock review. Dock-subordinate; never dispatched
# directly by PM. A FRESH setup enables all roles by default.
[[librarians]]
id = "librarian-01"
provider = "claude-code"
model = "claude-code"
enabled = true
worktree = "__garelier/{{pm_id}}/_librarians/librarian-01"
branch_namespace = "shelf"

# === Observer (read-only review/advice sidecar, DEC-019) ===
#
# Observer is a commit-free, read-only role that independently reviews
# diffs/reports before a studio merge by Dock or Artisan, and gives Workers
# non-binding code-direction advice. It never
# commits, merges, or takes lane.lock, and may run in BOTH lanes. The policy
# below decides when Observer review is MANDATORY; when required, a missing
# PASS/PASS_WITH_NOTES blocks the merge (a BLOCK verdict always escalates to
# PM). A FRESH setup enables all roles by default; the policy auto-enables
# whenever at least one Observer is configured.
[observer_policy]
enabled = true                        # top-level switch; true to activate Observer gating
require_for_all_merges = true         # review EVERY merge — enforces worker→guardian→observer→dock (and artisan→guardian→observer→artisan); merge-gate REFUSES any merge lacking a passing Observer verdict. Set false to review only on the triggers below (cost↓, but small/benign merges go unreviewed).
require_for_artisan_premerge = true   # Artisan must pass Observer before studio integration
require_for_large_diff = true
large_diff_lines = 100                 # churn (added+deleted) at/above which Observer review is mandatory; default 100. (Dormant while require_for_all_merges = true, which already reviews every merge.)
require_for_protected_paths = true
require_for_public_api_change = true
require_for_migration = true
require_for_auth_security = true
allow_worker_direction_request = true
max_parallel_requests = 1
advice_is_binding = false

# One [[observers]] block per Observer instance. `enabled` defaults true.
# allowed_request_kinds limits which review kinds this Observer accepts.
[[observers]]
id = "observer-01"
provider = "claude-code"
model = "claude-code"
enabled = true
worktree = "__garelier/{{pm_id}}/_observers/observer-01"
allowed_request_kinds = ["merge_review", "artisan_premerge_review", "direction_advice", "architecture_risk_review", "policy_consistency_review"]

# Specialty Observers (optional): scope an Observer to one domain.
# [[observers]]
# id = "observer-security"
# provider = "codex-cli"
# model = "gpt-5-codex"
# enabled = true
# specialty = "security"
# allowed_request_kinds = ["policy_consistency_review", "merge_review"]

# === Guardian (security/privacy/dependency/license gate, DEC-024) ===
# Guardian is the security GATE: commit-free, on an ephemeral `gavel` branch,
# reads Librarian-owned security knowledge (docs/garelier/security/) and emits
# PASS / PASS_WITH_NOTES / BLOCK / NO_OPINION. A FRESH setup enables all roles
# by default; the policy auto-enables whenever at least one Guardian exists.
[guardian_policy]
enabled = true
require_for_all_merges = true         # security-gate EVERY merge — the guardian step of worker→guardian→observer→dock; merge-gate REFUSES any merge lacking a passing Guardian verdict. Set false to gate only on the mechanical triggers below.
branch_namespace = "gavel"
# Gate timings (delta is the core; preflight/final are staged).
require_delta_before_observer = true
require_final_before_merge = true
require_for_artisan_premerge = true
require_for_promote = true
# Mechanical triggers (when a gate is mandatory).
require_for_dependency_changes = true
require_for_lockfile_changes = true
require_for_auth_security = true
require_for_config_infra_ci_deploy = true
require_for_protected_paths = true
# Blocking rules.
block_on_secret = true
block_on_pii = true
block_on_customer_data = true
block_on_private_key = true
block_on_critical_vulnerability = true
block_on_high_vulnerability = true
block_on_forbidden_license = true
block_on_unknown_license = false
block_when_required_scanner_unavailable = true
# Output safety.
redact_evidence = true
forbid_secret_value_in_report = true

[guardian_policy.security_sensitive_paths]
paths = [".env*", "**/*.pem", "**/*.key", "**/*secret*", "**/*credential*", "infra/**", "deploy/**", ".github/workflows/**", "migrations/**"]

[guardian_policy.package_files]
paths = ["package.json", "package-lock.json", "pnpm-lock.yaml", "yarn.lock", "Cargo.toml", "Cargo.lock", "requirements.txt", "pyproject.toml", "poetry.lock", "go.mod", "go.sum"]

# Scanner commands. Empty = Guardian uses available project tools and reports
# NO_OPINION/BLOCK per policy if a required command is missing.
#
# PREREQUISITE: a named scanner must be installed + on PATH. Guardian runs as
# an in-session subagent, so the session's permissions must allow running the
# scanner (gitleaks by default); custom scanner commands may need project-local
# allowlist entries. If a MANDATORY scanner (secret / PII) is absent, the gate
# cannot PASS — it BLOCKs (block_when_required_scanner_unavailable = true,
# above). Default secret scanner is gitleaks (winget Gitleaks.Gitleaks / brew
# gitleaks). Note: `gitleaks detect` is deprecated since 8.19 (still runs);
# modern form is `gitleaks dir` / `git`.
#
# Public / docs-only fallback when gitleaks cannot be used:
#   block_when_required_scanner_unavailable = false
#   secret_scan = "off"
# This keeps Guardian running in a degraded mode. Guardian must not claim full
# secret-scanner coverage; it reports the off setting in guardian_report.md and
# uses available git/Bun/text review instead.
[guardian_tools]
secret_scan = "gitleaks detect --no-banner --redact --source ."
pii_scan = ""
dependency_scan = ""
license_scan = ""
sast_scan = ""

# One [[guardians]] block per Guardian instance. A FRESH setup enables all
# roles by default.
[[guardians]]
id = "guardian-01"
provider = "claude-code"
model = "claude-code"
enabled = true
checkout = true
worktree = "__garelier/{{pm_id}}/_guardians/guardian-01"
allowed_request_kinds = ["preflight", "delta_gate", "final_gate", "promote_gate", "knowledge_update_request"]

# === Concierge (external operations executor / PM's delegate of last resort, DEC-025) ===
# Concierge EXECUTES PM-approved operations that leave Garelier's local sandbox.
# Phase 1 = promote_target (merge studio into target on its own worktree, quality
# gate on the merged tree, tag, push) + read-only sync_remote. It never implements
# source, decides policy, gates, pushes garelier/* branches, force-pushes, or runs
# a blind git pull. Reads Librarian-owned docs/garelier/external_operations/ and
# consumes the Guardian promote_gate verdict. A FRESH setup enables all roles by
# default; the policy auto-enables whenever at least one Concierge exists. Enabling
# it does NOT auto-push: external writes still require an explicit user instruction
# behind the PM assignment.
[concierge_policy]
enabled = true
branch_namespace = "clipboard"
require_pm_approval = true
require_user_instruction_for_write = true
require_librarian_policy_sources = true
require_guardian_before_external_write = true
require_external_lock = true
forbid_push_garelier_branches = true
forbid_force_push = true
forbid_blind_git_pull = true
redact_sensitive_output = true
# Remote-visible work uses these prefixes — never garelier/* (Phase 2).
allowed_external_branch_prefixes = ["publish/", "pr/", "release/"]

[concierge_policy.required_knowledge]
paths = [
    "docs/garelier/external_operations/external_operations_policy.md",
    "docs/garelier/external_operations/git_remote_policy.md",
    "docs/garelier/external_operations/promote_policy.md",
    "docs/garelier/external_operations/rollback_policy.md",
]

# One [[concierges]] block per Concierge instance. Fresh setup enables one
# Concierge by default; set enabled = false or remove the block to disable.
# checkout is always true (external operations need live git state).
# allowed_operation_kinds defaults to the Phase 1 set; Phase 2 kinds
# (create_pr/create_release/update_ticket/...) are added deliberately, per DEC-025.
# A FRESH setup enables all roles by default.
[[concierges]]
id = "concierge-01"
provider = "claude-code"
model = "claude-code"
enabled = true
checkout = true
worktree = "__garelier/{{pm_id}}/_concierges/concierge-01"
branch_namespace = "clipboard"
allowed_operation_kinds = ["promote_target", "sync_remote"]

[milestones]
current = []                # Filled by PM when milestones are defined

# === Status Web Console (read-only) ===
#
# A local, read-only browser view of Garelier state (lane, roles,
# branches, merge gate, recent reports, warnings, source/routine
# registries). Zero AI tokens — it only reads runtime files. Start it with
# `bun run status -- --pm-id <pm_id>` from the driver directory, or
# `bun run skills/garelier-core/driver/src/status_web.ts --pm-id <pm_id>`.
# It is read-only and never mutates state. Default bind is LAN-reachable for
# watching from another PC on the same trusted network; use 127.0.0.1 for local
# only.
[status_web]
enabled = false              # informational; the standalone command runs regardless
host = "0.0.0.0"             # LAN; use "127.0.0.1" for loopback only
port = 3787
auto_refresh_seconds = 5
read_only = true             # phase 1 is read-only; no operation UI
show_source_urls = true      # false => show only the host of source registry URLs

# === Permissions (autonomy profile) ===
#
# Controls how much the provider CLI is trusted. `dangerous` is the old
# always-full-access behavior (Claude --dangerously-skip-permissions /
# Codex --sandbox danger-full-access) and must be an explicit opt-in.
# Default `reviewed`: Claude auto-accepts edits, Codex writes only inside the
# workspace. `safe` is most restrictive (inspection / attended use). Long
# unattended autonomous runs typically need `dangerous` in an isolated
# environment — choose it deliberately and record why.
[permissions]
profile = "reviewed"                  # safe | reviewed | dangerous
allow_network = false
allow_destructive_commands = false
allow_secret_read = false
require_pm_approval_paths = [".env*", "infra/**", "migrations/**", ".github/workflows/**", "deploy/**"]
forbidden_paths = ["**/*.pem", "**/*secret*", "**/id_rsa"]

# === Quality gate (DEC-007) ===
#
# Commands run by the merge-gate subprocess after
# 'git merge --no-ff --no-commit'. Each is a single shell line; failure of
# any aborts the merge. Garelier targets any large app, not just Rust: set
# `stack` to pick a default FULL command set, or list `commands` explicitly
# (back-compat alias for full.commands). stack = "custom" REQUIRES explicit
# full commands — setup is not complete until they are filled in.
#   rust         -> cargo check/test/clippy
#   typescript   -> npm ci / typecheck / test / lint
#   python       -> pip install -e . / ruff / pytest
#   go           -> go build / vet / test
#   mixed|custom -> none (list commands yourself)
[quality_gate]
stack = "custom"
commands = [
    # "npm ci",
    # "npm run typecheck",
    # "npm test",
]
timeout_minutes_per_cmd = 120

# Optional fast/full split. During bounded implementation batches, roles use
# fast when available. Merge gate, promote, and REPORTING/completion use full.
# `[quality_gate] commands` above remains a legacy alias for `[quality_gate.full]`.
[quality_gate.fast]
commands = [
    # "npm run typecheck",
]
timeout_minutes_per_cmd = 10

[quality_gate.full]
commands = [
    # "npm ci",
    # "npm run typecheck",
    # "npm test",
]
timeout_minutes_per_cmd = 120

# Deterministic auto-FIX (formatter WRITE) commands (DEC-049 C1). A producer
# runs these ONCE in its own dispatch worktree before its check gate so a
# formatting nit is fixed at the source instead of failing the expensive merge
# gate and forcing a rework cycle. With the section
# below ABSENT (as shipped), it DEFAULTS to the stack formatter (rust:
# `cargo fmt --all`, go: `go fmt ./...`, python: `ruff format .`; typescript
# varies so has no default). Uncomment to override; an explicit empty
# `commands = []` DISABLES autofix.
# [quality_gate.autofix]
# commands = [
#     "cargo fmt --all",
# ]

# === Retention (high-volume operation) ===
#
# Defaults from garelier-core/retention.md. Tune when daily reports,
# Scout inspections, or runtime archives become high-volume.

[retention]
history_hot_entries = 120
history_archive_granularity = "month"
inspection_path_granularity = "month"
inspection_monthly_summary = true
runtime_archive_keep_days = 30
runtime_archive_keep_files = 300
merge_gate_archive_keep_days = 14
role_local_archive_keep_days = 30

# === Execution backend (DEC-042) — INERT under dispatch-only ===
#
# Historical axis of the deleted headless driver (DEC-061/066). Nothing reads
# `backend` in this build; the section is tolerated so old configs still
# parse. Routing a seat to Codex is done per role (`provider = "codex-cli"`,
# DEC-058), not here.
[execution]
backend = "headless"

# === Dispatch ordering: cap + priority tiers (DEC-027 / DEC-031) ===
#
# Under dispatch-only the HARD parallelism cap is `[jig] fan_out_cap`
# (subagents per tick); the driver-era per-poll child counting is gone. The
# values below remain as ORCHESTRATOR GUIDANCE for choosing what to dispatch
# next under contention — gates first, then hardening/knowledge, then
# producers — and for `codex exec` subprocess budgeting (~1.5-2 GB RAM per
# concurrent provider CLI).
[concurrency]
max_concurrent_agents = 4
# Priority TIERS (highest first) decide who gets the NEXT free slot under
# contention. NOTE: "tier" is launch priority — distinct from the artisan/dock
# execution LANES (DEC-017, mutual exclusion). Within a tier, the longest-waiting
# agent runs first (FIFO).
#   tier 0  gates       — concierge/guardian/observer (external/safety/review that
#                         UNBLOCK or that the user waits on). Fixed top.
#   tier 1  smith,librarian   — hardening + knowledge. Dock-reorderable.
#   tier 2  worker,scout,artisan — producers. Worker/Scout FIFO when both run;
#                         Artisan (own lane) never competes with them.
#   tier 3  []          — RESERVED empty demotion lane: Dock can park a
#                         producer here (e.g. push Smith below the Workers while
#                         they finish a big batch, then restore it) via the hint.
# Dock reorders the producer roles (smith/librarian/worker/scout) at runtime
# with runtime/dock/tier_order.json; the gate tier and Artisan are fixed.
tiers = [
    ["concierge", "guardian", "observer"],
    ["smith", "librarian"],
    ["worker", "scout", "artisan"],
    [],
]
# A candidate deferred this many consecutive dispatch rounds is promoted to the
# front — the cross-tier starvation breaker. 0 disables aging (strict tier order).
starvation_cycles = 3
#
# A RESERVED "urgent" lane (normally empty) sits ABOVE every role tier: a per-task
# `urgent.md` marker in the agent container (PM/Dock-written for a user "do
# this first") promotes that one instance to the front — so it never competes with
# the gate tier, and multiple urgents run in FIFO (request) order. Urgent does NOT
# preempt: running agents are never killed; the urgent task takes the next free slot.

# === Output control (DEC-028) ===
#
# Keeps producer FINAL responses short, on top of the existing compact-handoff
# (durable role-to-role files) and retention. Each role gets an output
# profile; the dispatch prompt appends a short directive asking the subagent
# to keep its final response within the soft budget and put durable detail in
# official files. Over-budget responses are WARNED, not failed. (The
# driver_log_* keys are driver-era log-rotation knobs, tolerated for old
# configs.)
#
# Never shortens code, paths, commands, URLs, errors, dates, numbers, or SHAs,
# and never hides risks / blockers / warnings / approvals. Safety-leaning roles
# (guardian, concierge) default to `normal`.
[output_control]
enabled = true
default_profile = "compact"          # normal | compact | micro
violation_mode = "warn"              # warn (observe) | fail (experimental)
model_result_log_chars = 600         # excerpt cap for stored result logs (100-5000)
error_tail_chars = 500               # stderr/stdout tail stored on failure (0 disables the tail)
driver_log_max_bytes = 10485760      # driver-era log-rotation knob (tolerated)
driver_log_keep_files = 10           # driver-era log-rotation knob (tolerated)
usage_summary = true                 # driver-era usage JSONL knob (tolerated)

[output_control.profiles.normal]
soft_result_chars = 1600
max_bullets = 8
[output_control.profiles.compact]
soft_result_chars = 900
max_bullets = 5
[output_control.profiles.micro]
soft_result_chars = 500
max_bullets = 3

# Per-role profile. guardian/concierge stay normal so warnings/approvals are not
# pressured short; scout/observer are micro (their detail lives in the artifact).
[output_control.roles]
pm = "normal"
dock = "compact"
worker = "compact"
smith = "compact"
artisan = "compact"
scout = "micro"
observer = "micro"
librarian = "compact"
guardian = "normal"
concierge = "normal"

# === Setup completion marker ===
#
# Written by the wizard as its last step. PM treats a project as fully
# initialized only when [setup] complete = true is present. If absent,
# the project is a partial install (wizard crashed or was killed
# mid-run) and PM will rerun the wizard, which offers a cleanup of any
# leftover __garelier/ scaffolding before retrying fresh init.

[setup]
complete = true
completed_at = "{{ISO8601_timestamp}}"
wizard_version = "2.6.1"

# === Optional: Autonomous dispatch loop ===
#
# Garelier can self-pace toward a goal on large, long-running roadmaps
# (dispatch-only, DEC-061/066: the attended PM/orchestrator session arms a
# self-paced /loop; producers run as in-session subagents / `codex exec`).
# The top-level switch is `enabled`. When false (default), Garelier behaves
# as a classic setup with all user-confirmation gates intact; one-off
# dispatches need no [autonomy] at all.
#
# When enabled = true:
#   - PM skips blueprint-drafting and milestone confirmation per the
#     auto_approve_* flags below
#   - each tick runs DISPATCH -> GATE (Guardian -> Observer) -> INTEGRATE ->
#     RECORD; the [jig] block above (DEC-062, default-on) executes the tick
#     as code, and the four HARD human-decision gates always park to PM
#     (see garelier-pm/references/autonomous-mode.md)
#
# Promote flow (studio -> target merge) ALWAYS requires explicit user
# instruction, even when the loop is armed. PM records the approval and
# Concierge executes it; there is no PM fallback and no auto_promote flag.
#
# [autonomy]
# enabled = false                          # arm the self-paced /loop (opt-in)
# auto_approve_blueprints = false          # PM auto-proceeds on its own judgment (soft-gate collapse)
# auto_approve_milestones = false          # milestone bookkeeping commits without confirmation
#
# fan_out_cap = 3                          # max parallel producer subagents per tick
# # (require_for_all_merges is NOT an [autonomy] key — it lives in
# #  [guardian_policy] / [observer_policy] above; keep it true there.)
# protected_paths = [                      # HARD gates to the human PM (engine-core/protected)
#   "core/engine/**", "Cargo.toml", "Cargo.lock", ".github/**", "infra/**", "deploy/**", "migrations/**",
# ]
