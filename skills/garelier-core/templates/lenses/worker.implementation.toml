[lens_pack]
id = "worker.implementation"
role = "worker"
schema_version = 1
status = "active"
description = "Worker implementation focus groups."

[[groups]]
id = "reuse_first"
status = "active"
label = "Reuse-first minimal change"
description = """
Before writing new code, climb this ladder in order and stop at the first rung \
that fits: (1) an existing recurrence-prevention measure / past lesson for this \
area, (2) the project's conventions and coding standards, (3) existing code in \
this repo, (4) the standard library, (5) a platform feature, (6) an \
already-installed dependency, (7) a one-line solution — only then write the \
minimum new code. Lazy about the solution, never about reading. Validation, \
error handling, and security are never minimized."""

[groups.focus]
primary = "smallest_correct_change_via_reuse_ladder"
secondary = "recurrence_prevention_then_conventions_then_existing"
avoid = "new_abstractions_speculative_generality_unneeded_dependencies"

[groups.limits]
may_not_override_role_contract = true
may_not_relax_must_block = true

[[groups]]
id = "minimal_patch"
status = "active"
label = "Minimal patch"
description = "Prefer a small, local change that follows existing project patterns."

[groups.focus]
primary = "small_correct_change"
secondary = "existing_patterns"
avoid = "unrelated_refactor"

[groups.limits]
may_not_override_role_contract = true
may_not_relax_must_block = true

[[groups]]
id = "robustness_first"
status = "active"
label = "Robustness first"
description = """
Front-load failure modes: enumerate edge cases, error / exception paths, and \
invalid inputs (and a brief plan) before implementing. For robustness-critical \
work or faster / cheaper model tiers. Still reuse before adding new code."""

[groups.focus]
primary = "failure_modes_and_edge_cases_first"
secondary = "brief_plan_before_code"
avoid = "happy_path_only"

[groups.limits]
may_not_override_role_contract = true
may_not_relax_must_block = true
